<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verdis — Greenhouse Operations Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <style>
    /* ──────────────────────────────────────────────────────────
       VERDIS v2 — Editorial-modern design tokens
       ────────────────────────────────────────────────────────── */
    :root {
      /* Defaults — overridden by applyTheme() at runtime */
      --v-bg: #0a0e0b;
      --v-bg-deep: #060807;
      --v-surface: #11161200;
      --v-card: #131814;
      --v-elev: #1a211d;
      --v-line: rgba(202, 215, 200, 0.08);
      --v-line-2: rgba(202, 215, 200, 0.16);
      --v-line-3: rgba(202, 215, 200, 0.30);
      --v-text: #ecf0e9;
      --v-text-2: #b8c1b6;
      --v-muted: #7a847a;
      --v-accent: oklch(0.82 0.17 142);
      --v-accent-deep: oklch(0.66 0.17 142);
      --v-accent-dim: oklch(0.55 0.14 142);
      --v-glow: oklch(0.65 0.18 142 / 0.18);

      --v-font-display: "Geist", "Inter Tight", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --v-font-serif: "Instrument Serif", "Times New Roman", Times, serif;
      --v-font-mono: "Geist Mono", ui-monospace, Menlo, Consolas, monospace;

      --v-max: 1360px;
      --v-max-wide: 1480px;

      --v-rad-sm: 6px;
      --v-rad-md: 12px;
      --v-rad-lg: 20px;
      --v-rad-xl: 28px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--v-bg);
      color: var(--v-text);
      font-family: var(--v-font-display);
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      transition: background-color 0.4s ease, color 0.4s ease;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; }
    img { display: block; max-width: 100%; }

    /* ──────────────────────────────────────────────────────────
       Ambient background — dot grid + radial glow
       ────────────────────────────────────────────────────────── */
    .v-ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(circle at 20% 0%, var(--v-glow) 0%, transparent 50%),
        radial-gradient(circle at 80% 100%, var(--v-glow) 0%, transparent 50%);
      opacity: 0.7;
    }
    .v-ambient::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, var(--v-line) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
      opacity: 0.6;
    }

    /* ──────────────────────────────────────────────────────────
       Container / Section
       ────────────────────────────────────────────────────────── */
    .v-container {
      max-width: var(--v-max);
      margin: 0 auto;
      padding: 0 32px;
      position: relative;
      z-index: 1;
    }
    .v-container--wide { max-width: var(--v-max-wide); }
    @media (max-width: 720px) {
      .v-container { padding: 0 20px; }
    }

    .v-section {
      padding: 140px 0;
      position: relative;
    }
    @media (max-width: 720px) {
      .v-section { padding: 80px 0; }
    }

    .v-section-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--v-font-mono);
      font-size: 11px;
      letter-spacing: 0.10em;
      color: var(--v-muted);
      margin-bottom: 32px;
      text-transform: uppercase;
    }
    .v-section-label-num {
      color: var(--v-accent);
      font-weight: 500;
    }
    .v-section-label-line {
      width: 32px;
      height: 1px;
      background: var(--v-line-2);
    }

    .v-section-head {
      max-width: 920px;
      margin: 0 0 80px 0;
    }
    .v-section-sub {
      font-size: 22px;
      color: var(--v-text-2);
      line-height: 1.45;
      margin: 28px 0 0 0;
      max-width: 64ch;
      text-wrap: pretty;
      font-weight: 300;
    }

    /* ──────────────────────────────────────────────────────────
       Typography
       ────────────────────────────────────────────────────────── */
    .v-h-display {
      font-family: var(--v-font-display);
      font-size: clamp(56px, 8vw, 132px);
      font-weight: 400;
      line-height: 0.94;
      letter-spacing: -0.045em;
      margin: 0;
      text-wrap: balance;
    }
    .v-h-display em {
      font-family: var(--v-font-serif);
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--v-accent);
      padding-right: 0.06em;
    }

    .v-h2 {
      font-family: var(--v-font-display);
      font-size: clamp(40px, 4.6vw, 76px);
      font-weight: 400;
      line-height: 1.0;
      letter-spacing: -0.035em;
      margin: 0;
      max-width: 22ch;
      text-wrap: balance;
    }
    .v-h2 em {
      font-family: var(--v-font-serif);
      font-style: italic;
      font-weight: 400;
      color: var(--v-accent);
    }

    .v-h3 {
      font-family: var(--v-font-display);
      font-size: clamp(24px, 2.2vw, 32px);
      font-weight: 500;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin: 0;
      text-wrap: balance;
    }

    /* ──────────────────────────────────────────────────────────
       Buttons & Pills
       ────────────────────────────────────────────────────────── */
    .v-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
      border-radius: 999px;
      font-family: var(--v-font-display);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(.4, 0, .2, 1);
      white-space: nowrap;
      position: relative;
    }
    .v-btn--sm { padding: 9px 16px; font-size: 13px; }
    .v-btn--md { padding: 12px 20px; font-size: 14px; }
    .v-btn--lg { padding: 16px 26px; font-size: 15px; }

    .v-btn--primary {
      background: var(--v-accent);
      color: #0a0f0a;
      border-color: var(--v-accent);
      box-shadow: 0 0 0 0 var(--v-glow), 0 1px 0 0 rgba(255,255,255,0.15) inset;
    }
    .v-btn--primary:hover {
      background: var(--v-accent);
      transform: translateY(-1px);
      box-shadow: 0 0 0 6px var(--v-glow), 0 1px 0 0 rgba(255,255,255,0.15) inset;
    }

    .v-btn--ghost {
      background: rgba(255,255,255,0.02);
      color: var(--v-text);
      border-color: var(--v-line-2);
      backdrop-filter: blur(8px);
    }
    .v-btn--ghost:hover {
      border-color: var(--v-line-3);
      background: rgba(255,255,255,0.04);
    }

    .v-btn-arrow {
      transition: transform 0.2s cubic-bezier(.4, 0, .2, 1);
      font-size: 1.1em;
      display: inline-block;
    }
    .v-btn:hover .v-btn-arrow { transform: translateX(4px); }

    /* Pill / chip */
    .v-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px 7px 10px;
      border: 1px solid var(--v-line-2);
      border-radius: 999px;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(8px);
      font-size: 13px;
      color: var(--v-text-2);
      font-weight: 400;
    }
    .v-pill-mono {
      font-family: var(--v-font-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
    }
    .v-blink {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--v-accent);
      box-shadow: 0 0 8px var(--v-accent);
      animation: vblink 1.8s ease-in-out infinite;
    }
    @keyframes vblink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* ──────────────────────────────────────────────────────────
       Nav
       ────────────────────────────────────────────────────────── */
    .v-nav {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: calc(100% - 36px);
      max-width: 1100px;
      background: rgba(10, 14, 11, 0.65);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid var(--v-line-2);
      border-radius: 999px;
      padding: 8px 8px 8px 22px;
      transition: all 0.3s ease;
    }
    .v-nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .v-nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.02em;
      color: var(--v-text);
    }
    .v-nav-links {
      display: flex;
      gap: 28px;
      font-size: 14px;
    }
    .v-nav-links a {
      color: var(--v-text-2);
      transition: color 0.2s ease;
      position: relative;
    }
    .v-nav-links a:hover { color: var(--v-text); }
    .v-nav-cta {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .v-nav-mode {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--v-line-2);
      color: var(--v-text-2);
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .v-nav-mode:hover {
      color: var(--v-accent);
      border-color: var(--v-line-3);
      background: rgba(255,255,255,0.08);
      transform: rotate(-12deg);
    }
    .v-nav-mode svg { display: block; }
    [data-mode="light"] .v-nav-mode {
      background: rgba(255,255,255,0.06);
      border-color: rgba(202, 215, 200, 0.16);
      color: #b8c1b6;
    }
    [data-mode="light"] .v-nav-mode:hover {
      background: rgba(255,255,255,0.12);
      color: #ecf0e9;
    }
    @media (max-width: 800px) {
      .v-nav-links { display: none; }
    }

    /* ──────────────────────────────────────────────────────────
       Hero
       ────────────────────────────────────────────────────────── */
    .v-hero {
      padding: 180px 0 80px;
      position: relative;
    }
    .v-hero-pill {
      margin-bottom: 40px;
    }
    .v-hero-sub {
      font-size: clamp(18px, 1.5vw, 22px);
      line-height: 1.45;
      color: var(--v-text-2);
      max-width: 58ch;
      margin: 40px 0 0 0;
      text-wrap: pretty;
      font-weight: 300;
    }
    .v-hero-cta {
      display: flex;
      gap: 12px;
      margin-top: 48px;
      flex-wrap: wrap;
      align-items: center;
    }
    .v-hero-fineprint {
      font-family: var(--v-font-mono);
      font-size: 11px;
      color: var(--v-muted);
      letter-spacing: 0.04em;
      margin-left: 8px;
    }

    .v-hero-mock {
      margin-top: 100px;
      position: relative;
    }
    .v-hero-mock::before {
      content: "";
      position: absolute;
      inset: -40px;
      background: radial-gradient(ellipse at center, var(--v-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ──────────────────────────────────────────────────────────
       Marquee — trust strip
       ────────────────────────────────────────────────────────── */
    .v-marquee {
      border-top: 1px solid var(--v-line);
      border-bottom: 1px solid var(--v-line);
      padding: 24px 0;
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    }
    .v-marquee-track {
      display: flex;
      gap: 80px;
      animation: vmarquee 40s linear infinite;
      width: max-content;
      align-items: center;
    }
    .v-marquee-item {
      font-family: var(--v-font-mono);
      font-size: 12px;
      color: var(--v-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 14px;
      white-space: nowrap;
    }
    .v-marquee-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--v-accent);
    }
    @keyframes vmarquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ──────────────────────────────────────────────────────────
       Spec row & inline meta
       ────────────────────────────────────────────────────────── */
    .v-spec {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--v-line);
      font-family: var(--v-font-mono);
      font-size: 12px;
    }
    .v-spec-k {
      color: var(--v-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 10px;
      flex-shrink: 0;
      min-width: 80px;
    }
    .v-spec-dots {
      flex: 1;
      border-bottom: 1px dashed var(--v-line-2);
      transform: translateY(-3px);
      min-width: 20px;
    }
    .v-spec-v {
      color: var(--v-text);
      text-align: right;
    }
    .v-spec-link {
      color: var(--v-text);
      text-decoration: none;
      border-bottom: 1px dashed var(--v-line-2);
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    .v-spec-link:hover {
      color: var(--v-accent);
      border-bottom-color: var(--v-accent);
    }

    /* ──────────────────────────────────────────────────────────
       Placeholder (striped imagery)
       ────────────────────────────────────────────────────────── */
    .v-ph {
      position: relative;
      width: 100%;
      background: var(--v-card);
      border: 1px solid var(--v-line);
      border-radius: var(--v-rad-md);
      overflow: hidden;
      color: var(--v-muted);
    }
    .v-ph-stripes {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.4;
    }
    .v-ph-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--v-font-mono);
      font-size: 10px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--v-text-2);
    }
    .v-ph-bracket { color: var(--v-accent); }

    /* ──────────────────────────────────────────────────────────
       System preview (faux dashboard) — modernized
       ────────────────────────────────────────────────────────── */
    .v-preview {
      position: relative;
      border: 1px solid var(--v-line-2);
      border-radius: var(--v-rad-xl);
      background: var(--v-bg-deep);
      overflow: hidden;
      box-shadow:
        0 40px 100px -30px rgba(0,0,0,.7),
        0 8px 24px -4px rgba(0,0,0,.3),
        0 0 0 1px rgba(255,255,255,0.02) inset;
    }
    .v-preview-chrome {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--v-line);
      background: rgba(255,255,255,0.01);
    }
    .v-preview-dots {
      display: flex;
      gap: 7px;
    }
    .v-preview-dots span {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--v-line-2);
    }
    .v-preview-dots span:nth-child(1) { background: oklch(0.65 0.15 25); }
    .v-preview-dots span:nth-child(2) { background: oklch(0.78 0.13 75); }
    .v-preview-dots span:nth-child(3) { background: var(--v-accent); }

    .v-preview-url {
      flex: 1;
      font-family: var(--v-font-mono);
      font-size: 11px;
      color: var(--v-text-2);
      letter-spacing: 0.02em;
      text-align: center;
      padding: 5px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--v-line);
      border-radius: 6px;
      max-width: 380px;
      margin: 0 auto;
    }
    .v-preview-url-lock { color: var(--v-accent); margin-right: 6px; }
    .v-preview-actions {
      display: flex;
      gap: 14px;
      font-family: var(--v-font-mono);
      font-size: 10px;
      color: var(--v-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      align-items: center;
    }
    .v-preview-live {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--v-accent);
    }
    .v-live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--v-accent);
      box-shadow: 0 0 6px var(--v-accent);
      animation: vblink 1.4s ease-in-out infinite;
    }

    /* ──────────────────────────────────────────────────────────
       App preview internals — mirrors the actual software
       ────────────────────────────────────────────────────────── */
    .v-app {
      background:
        radial-gradient(1200px 600px at 15% 0%, rgba(16,185,129,0.10), transparent 55%),
        radial-gradient(900px 500px at 85% 10%, rgba(14,165,233,0.08), transparent 55%),
        linear-gradient(180deg, #0b1220 0%, #0b1220 100%);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 720px;
    }

    /* Hero (dark green bar) */
    .v-app-hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(6,78,59,0.98), rgba(6,95,70,0.92), rgba(4,120,87,0.7));
      border: 1px solid rgba(148,163,184,0.20);
      box-shadow: 0 18px 45px rgba(0,0,0,0.25);
      color: #fff;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      flex-wrap: wrap;
    }
    .v-app-hero-title {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #fff;
      margin: 0;
    }
    .v-app-hero-r {
      text-align: right;
      color: rgba(255,255,255,0.85);
      font-size: 11px;
    }
    .v-app-hero-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 6px;
    }
    .v-app-user {
      color: rgba(255,255,255,0.9);
      font-size: 12px;
      font-weight: 500;
    }
    .v-app-logout {
      background: #dc2626;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: default;
    }
    .v-app-hero-date {
      color: rgba(255,255,255,0.75);
      font-size: 11px;
    }
    .v-app-sync {
      color: rgba(255,255,255,0.55);
      font-size: 10px;
      margin-left: 4px;
    }

    /* Pill nav */
    .v-app-nav {
      display: flex;
      gap: 4px;
      padding: 6px;
      border-radius: 18px;
      border: 1px solid rgba(148,163,184,0.22);
      background: rgba(15,23,42,0.55);
      backdrop-filter: blur(10px);
      overflow-x: auto;
      flex-wrap: wrap;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .v-app-tab {
      background: transparent;
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      color: #cbd5e1;
      cursor: default;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: background 0.15s ease;
    }
    .v-app-tab:hover { background: rgba(148,163,184,0.12); color: #fff; }
    .v-app-tab--active {
      background: linear-gradient(135deg, rgba(16,185,129,0.95), rgba(14,165,233,0.75));
      color: #fff;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(0,0,0,0.20);
    }
    .v-app-tab-badge {
      background: #e11d48;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 999px;
      min-width: 18px;
      text-align: center;
    }

    /* Quick actions */
    .v-app-qa {
      border-radius: 18px;
      border: 1px solid rgba(148,163,184,0.22);
      background: rgba(15,23,42,0.40);
      padding: 14px 16px;
    }
    .v-app-qa-title {
      font-size: 13px;
      font-weight: 600;
      color: #e5e7eb;
      text-align: center;
      margin-bottom: 10px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .v-app-qa-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    @media (max-width: 900px) { .v-app-qa-grid { grid-template-columns: repeat(2, 1fr); } }
    .v-app-qa-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 11.5px;
      font-weight: 500;
      color: #fff;
      cursor: default;
      font-family: ui-sans-serif, system-ui, sans-serif;
      line-height: 1.3;
      text-align: center;
    }
    .v-app-qa-btn--amber   { background: #d97706; }
    .v-app-qa-btn--emerald { background: #059669; }
    .v-app-qa-btn--green   { background: #15803d; }
    .v-app-qa-btn--sky     { background: #0369a1; }
    .v-app-qa-btn--teal    { background: #047857; }

    /* Selectors */
    .v-app-sel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 600px) { .v-app-sel { grid-template-columns: 1fr; } }
    .v-app-sel-field { display: flex; flex-direction: column; gap: 4px; }
    .v-app-sel-field label {
      font-size: 12px;
      font-weight: 600;
      color: #e5e7eb;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .v-app-select {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.25);
      background: rgba(2,6,23,0.55);
      color: #e5e7eb;
      font-size: 12px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .v-app-select--dis { color: rgba(226,232,240,0.45); }
    .v-app-select-chev { color: rgba(226,232,240,0.5); font-size: 10px; }

    /* Greenhouse map */
    .v-app-map {
      border-radius: 18px;
      border: 1px solid rgba(148,163,184,0.22);
      background: rgba(15,23,42,0.5);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .v-app-map-h {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .v-app-map-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #f1f5f9;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .v-app-map-bar {
      display: inline-block;
      width: 4px;
      height: 14px;
      background: #14b8a6;
      border-radius: 2px;
    }
    .v-app-map-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #94a3b8;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .v-app-map-switch {
      width: 24px; height: 13px;
      background: #14b8a6;
      border-radius: 999px;
      position: relative;
      display: inline-block;
    }
    .v-app-map-switch span {
      position: absolute;
      top: 2px; right: 2px;
      width: 9px; height: 9px;
      background: #fff;
      border-radius: 50%;
    }

    .v-app-map-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 700px) { .v-app-map-grid { grid-template-columns: 1fr; } }

    .v-app-hall {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .v-app-hall-h {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-radius: 12px;
      color: #fff;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
    }
    .v-app-hall-count {
      font-size: 10px;
      font-weight: 400;
      opacity: 0.9;
    }
    .v-app-rooms {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    @media (max-width: 500px) { .v-app-rooms { grid-template-columns: repeat(5, 1fr); } }
    .v-app-room {
      border-radius: 6px;
      border: 1px solid rgba(148,163,184,0.20);
      padding: 8px 4px;
      text-align: center;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 9px;
      font-weight: 500;
      cursor: default;
      transition: filter 0.15s ease;
    }
    .v-app-room:hover { filter: brightness(1.1); }
    .v-app-room--assigned {
      background: rgba(16,185,129,0.18);
      color: #d1fae5;
      border-color: rgba(16,185,129,0.35);
    }
    .v-app-room--empty {
      background: rgba(148,163,184,0.10);
      color: #cbd5e1;
      border-color: rgba(148,163,184,0.22);
    }
    .v-app-room--task {
      background: rgba(245,158,11,0.20);
      color: #fde68a;
      border-color: rgba(245,158,11,0.40);
    }
    .v-app-room--alert {
      background: rgba(239,68,68,0.20);
      color: #fecaca;
      border-color: rgba(239,68,68,0.45);
    }
    .v-app-room-n { display: block; line-height: 1.2; }

    .v-app-legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 10px;
      color: #94a3b8;
    }
    .v-app-legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .v-app-legend-r {
      margin-left: auto;
      color: #64748b;
      font-size: 10px;
    }
    .v-app-sw {
      width: 10px; height: 10px;
      display: inline-block;
      border-radius: 3px;
    }
    .v-app-sw--assigned { background: rgba(16,185,129,0.6); }
    .v-app-sw--empty    { background: rgba(148,163,184,0.4); }
    .v-app-sw--task     { background: rgba(245,158,11,0.7); }
    .v-app-sw--alert    { background: rgba(239,68,68,0.7); }

    /* ──────────────────────────────────────────────────────────
       Bento grid (System section)
       ────────────────────────────────────────────────────────── */
    .v-bento {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-auto-rows: minmax(220px, auto);
      gap: 14px;
    }
    @media (max-width: 900px) { .v-bento { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .v-bento { grid-template-columns: 1fr; } }

    .v-bento-cell {
      position: relative;
      background: var(--v-card);
      border: 1px solid var(--v-line);
      border-radius: var(--v-rad-lg);
      padding: 28px;
      overflow: hidden;
      transition: border-color 0.2s ease, transform 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .v-bento-cell:hover {
      border-color: var(--v-line-2);
      transform: translateY(-2px);
    }
    .v-bento-cell--lg { grid-column: span 4; grid-row: span 2; }
    .v-bento-cell--md { grid-column: span 3; }
    .v-bento-cell--sm { grid-column: span 2; }
    @media (max-width: 900px) {
      .v-bento-cell--lg, .v-bento-cell--md, .v-bento-cell--sm { grid-column: span 2; }
    }
    @media (max-width: 600px) {
      .v-bento-cell--lg, .v-bento-cell--md, .v-bento-cell--sm { grid-column: span 1; }
    }
    .v-bento-tag {
      font-family: var(--v-font-mono);
      font-size: 10px;
      color: var(--v-accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .v-bento-h {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin: 0;
      text-wrap: balance;
    }
    .v-bento-cell--lg .v-bento-h {
      font-size: 36px;
      letter-spacing: -0.025em;
    }
    .v-bento-p {
      color: var(--v-text-2);
      font-size: 15px;
      line-height: 1.55;
      margin: 0;
      text-wrap: pretty;
      max-width: 48ch;
    }
    .v-bento-art {
      margin-top: auto;
      position: relative;
    }

    /* Bento illustrations */
    .v-illu-pulse {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 80px;
      padding-top: 16px;
    }
    .v-illu-pulse span {
      flex: 1;
      background: linear-gradient(to top, var(--v-accent-dim), var(--v-accent));
      border-radius: 2px;
      animation: vpulse 2.4s ease-in-out infinite;
      opacity: 0.7;
    }
    .v-illu-pulse span:nth-child(n+1) { animation-delay: calc(var(--i) * 0.1s); }
    @keyframes vpulse {
      0%, 100% { transform: scaleY(1); opacity: 0.4; }
      50% { transform: scaleY(1.5); opacity: 0.9; }
    }

    .v-illu-ring {
      width: 120px;
      height: 120px;
      margin: 0 auto;
      position: relative;
    }
    .v-illu-ring svg { width: 100%; height: 100%; }
    .v-illu-ring-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--v-font-serif);
      font-style: italic;
      font-size: 44px;
      color: var(--v-accent);
    }

    .v-illu-rooms {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 3px;
      margin-top: 8px;
    }
    .v-illu-rooms span {
      aspect-ratio: 1;
      border-radius: 2px;
      background: var(--v-line-2);
    }
    .v-illu-rooms span.on {
      background: var(--v-accent);
      box-shadow: 0 0 6px var(--v-accent);
    }
    .v-illu-rooms span.warn { background: oklch(0.7 0.15 70); }
    .v-illu-rooms span.alert { background: oklch(0.55 0.18 28); }

    .v-illu-notif {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .v-notif {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--v-line);
      border-radius: 999px;
      font-size: 12px;
      font-family: var(--v-font-mono);
      animation: vnotif 4s ease-in-out infinite;
    }
    .v-notif:nth-child(2) { animation-delay: 1s; }
    .v-notif:nth-child(3) { animation-delay: 2s; }
    .v-notif-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--v-accent);
      flex-shrink: 0;
    }
    .v-notif-dot--alert { background: oklch(0.6 0.18 28); }
    .v-notif-dot--warn { background: oklch(0.72 0.16 70); }
    .v-notif-time {
      margin-left: auto;
      color: var(--v-muted);
      font-size: 10px;
    }
    @keyframes vnotif {
      0% { transform: translateX(-10px); opacity: 0; }
      15%, 85% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(0); opacity: 1; }
    }

    /* ──────────────────────────────────────────────────────────
       Features — alternating editorial rows
       ────────────────────────────────────────────────────────── */
    .v-feat-list {
      display: flex;
      flex-direction: column;
    }
    .v-feat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      padding: 64px 0;
      border-top: 1px solid var(--v-line);
      align-items: center;
    }
    .v-feat-row:last-child { border-bottom: 1px solid var(--v-line); }
    .v-feat-row--rev .v-feat-row-art { order: -1; }
    @media (max-width: 900px) {
      .v-feat-row { grid-template-columns: 1fr; gap: 32px; padding: 48px 0; }
      .v-feat-row--rev .v-feat-row-art { order: 0; }
    }
    .v-feat-num {
      font-family: var(--v-font-serif);
      font-style: italic;
      font-size: 64px;
      color: var(--v-accent);
      line-height: 1;
      margin-bottom: 12px;
    }
    .v-feat-row-h {
      font-size: clamp(28px, 3vw, 44px);
      font-weight: 400;
      letter-spacing: -0.025em;
      line-height: 1.1;
      margin: 0 0 20px 0;
      text-wrap: balance;
    }
    .v-feat-row-p {
      font-size: 17px;
      color: var(--v-text-2);
      line-height: 1.5;
      margin: 0 0 24px 0;
      font-weight: 300;
      max-width: 50ch;
    }
    .v-feat-row-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .v-feat-tag {
      font-family: var(--v-font-mono);
      font-size: 11px;
      color: var(--v-text-2);
      padding: 5px 10px;
      border: 1px solid var(--v-line);
      border-radius: 999px;
      letter-spacing: 0.02em;
    }

    /* Features bottom — small grid for the rest */
    .v-feat-extras-head {
      font-family: var(--v-font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--v-muted);
      margin: 80px 0 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .v-feat-extras-line { flex: 1; height: 1px; background: var(--v-line); }
    .v-feat-extras {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--v-line);
      border: 1px solid var(--v-line);
      border-radius: var(--v-rad-md);
      overflow: hidden;
    }
    @media (max-width: 900px) { .v-feat-extras { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .v-feat-extras { grid-template-columns: 1fr; } }
    .v-feat-extra {
      background: var(--v-bg);
      padding: 24px 26px 28px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background 0.15s ease;
    }
    .v-feat-extra:hover { background: var(--v-card); }
    .v-feat-extra-k {
      font-family: var(--v-font-mono);
      font-size: 10px;
      color: var(--v-accent);
      letter-spacing: 0.08em;
    }
    .v-feat-extra-t {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin: 4px 0 0 0;
    }
    .v-feat-extra-d {
      color: var(--v-text-2);
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
    }

    /* ──────────────────────────────────────────────────────────
       Sectors
       ────────────────────────────────────────────────────────── */
    .v-sector-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) { .v-sector-grid { grid-template-columns: 1fr; } }

    .v-sector {
      position: relative;
      padding: 40px;
      border: 1px solid var(--v-line);
      border-radius: var(--v-rad-xl);
      background: var(--v-card);
      display: flex;
      flex-direction: column;
      gap: 22px;
      overflow: hidden;
      transition: border-color 0.2s ease;
    }
    .v-sector:hover { border-color: var(--v-line-2); }
    .v-sector--lead {
      background: linear-gradient(135deg, var(--v-card) 0%, var(--v-elev) 100%);
      border-color: var(--v-line-2);
    }
    .v-sector-h {
      font-size: clamp(28px, 2.6vw, 40px);
      font-weight: 400;
      letter-spacing: -0.025em;
      line-height: 1.05;
      margin: 0;
      text-wrap: balance;
    }
    .v-sector-h em {
      font-family: var(--v-font-serif);
      font-style: italic;
      color: var(--v-accent);
    }
    .v-sector-p {
      color: var(--v-text-2);
      font-size: 15px;
      line-height: 1.55;
      margin: 0;
      text-wrap: pretty;
    }
    .v-sector-ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .v-sector-ul li {
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 14px;
      color: var(--v-text);
      padding: 12px 0;
      border-top: 1px solid var(--v-line);
    }
    .v-sector-ul li:last-child { border-bottom: 1px solid var(--v-line); }
    .v-tick {
      color: var(--v-accent);
      font-family: var(--v-font-mono);
      font-weight: 500;
      width: 14px;
    }

    /* ──────────────────────────────────────────────────────────
       Differentiators
       ────────────────────────────────────────────────────────── */
    .v-diff-stack {
      display: flex;
      flex-direction: column;
    }
    .v-diff {
      display: grid;
      grid-template-columns: 120px 1fr 340px;
      gap: 56px;
      padding: 64px 0;
      border-top: 1px solid var(--v-line);
      align-items: start;
    }
    .v-diff:last-child { border-bottom: 1px solid var(--v-line); }
    @media (max-width: 900px) {
      .v-diff { grid-template-columns: 1fr; gap: 24px; padding: 48px 0; }
    }
    .v-diff-n {
      font-family: var(--v-font-serif);
      font-style: italic;
      font-size: 80px;
      color: var(--v-accent);
      line-height: 0.9;
      letter-spacing: -0.03em;
    }
    .v-diff-t {
      font-size: clamp(28px, 3vw, 40px);
      font-weight: 400;
      letter-spacing: -0.025em;
      margin: 0;
      line-height: 1.1;
      text-wrap: balance;
    }
    .v-diff-p {
      color: var(--v-text-2);
      font-size: 17px;
      line-height: 1.55;
      margin: 18px 0 0 0;
      text-wrap: pretty;
      font-weight: 300;
      max-width: 56ch;
    }
    .v-diff-bullets {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .v-diff-bullets li {
      font-family: var(--v-font-mono);
      font-size: 12px;
      color: var(--v-text);
      padding: 12px 0;
      border-top: 1px dashed var(--v-line-2);
      letter-spacing: 0.01em;
      display: flex;
      gap: 10px;
    }
    .v-diff-bullets li:last-child { border-bottom: 1px dashed var(--v-line-2); }
    .v-diff-bullets li::before {
      content: "→";
      color: var(--v-accent);
      flex-shrink: 0;
    }

    /* ──────────────────────────────────────────────────────────
       Pricing
       ────────────────────────────────────────────────────────── */
    .v-price-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    @media (max-width: 900px) { .v-price-grid { grid-template-columns: 1fr; } }
    .v-price {
      position: relative;
      padding: 36px;
      border: 1px solid var(--v-line);
      border-radius: var(--v-rad-xl);
      background: var(--v-card);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .v-price--featured {
      border-color: var(--v-accent);
      background: linear-gradient(180deg, var(--v-elev) 0%, var(--v-card) 100%);
      box-shadow: 0 0 0 0 var(--v-glow), 0 0 60px -10px var(--v-glow);
    }
    .v-price-flag {
      position: absolute;
      top: 0;
      right: 28px;
      transform: translateY(-50%);
      background: var(--v-accent);
      color: #0a0f0a;
      padding: 5px 12px;
      border-radius: 999px;
      font-family: var(--v-font-mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .v-price-name {
      font-family: var(--v-font-mono);
      font-size: 11px;
      color: var(--v-muted);
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }
    .v-price-from {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .v-price-tag {
      font-family: var(--v-font-mono);
      font-size: 11px;
      color: var(--v-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .v-price-amt {
      font-size: 56px;
      font-weight: 400;
      letter-spacing: -0.035em;
      line-height: 1;
      font-family: var(--v-font-display);
    }
    .v-price-sub {
      font-family: var(--v-font-mono);
      font-size: 11px;
      color: var(--v-muted);
      margin-top: 6px;
    }
    .v-price-desc {
      color: var(--v-text-2);
      font-size: 14px;
      line-height: 1.55;
      margin: 0;
      font-weight: 300;
    }
    .v-price-ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 1;
    }
    .v-price-ul li {
      display: flex;
      gap: 12px;
      font-size: 13px;
      padding: 10px 0;
      border-top: 1px solid var(--v-line);
      align-items: baseline;
    }
    .v-price-ul li:last-child { border-bottom: 1px solid var(--v-line); }
    .v-price-fine {
      margin-top: 32px;
      font-family: var(--v-font-mono);
      font-size: 11px;
      color: var(--v-muted);
      text-align: center;
      letter-spacing: 0.02em;
    }

    /* ──────────────────────────────────────────────────────────
       Demo form
       ────────────────────────────────────────────────────────── */
    .v-demo-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 80px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .v-demo-grid { grid-template-columns: 1fr; gap: 48px; }
    }
    .v-demo-h em {
      font-family: var(--v-font-serif);
      font-style: italic;
      color: var(--v-accent);
    }
    .v-demo-p {
      color: var(--v-text-2);
      font-size: 17px;
      line-height: 1.55;
      margin: 24px 0 32px 0;
      font-weight: 300;
    }
    .v-demo-spec {
      display: flex;
      flex-direction: column;
    }

    .v-form {
      border: 1px solid var(--v-line-2);
      border-radius: var(--v-rad-xl);
      background: var(--v-card);
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .v-form-h {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--v-line);
      margin-bottom: 8px;
    }
    .v-form-meta {
      font-family: var(--v-font-mono);
      font-size: 11px;
      color: var(--v-muted);
      letter-spacing: 0.04em;
    }
    .v-field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 600px) { .v-field-grid { grid-template-columns: 1fr; } }
    .v-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .v-field--wide { grid-column: 1 / -1; }
    .v-field-l {
      font-family: var(--v-font-mono);
      font-size: 10px;
      color: var(--v-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      gap: 4px;
    }
    .v-field-req { color: var(--v-accent); }
    .v-field input,
    .v-field select,
    .v-field textarea {
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--v-line);
      border-radius: var(--v-rad-sm);
      padding: 12px 14px;
      color: var(--v-text);
      font-family: var(--v-font-display);
      font-size: 14px;
      transition: all 0.2s ease;
      width: 100%;
    }
    .v-field textarea { font-family: var(--v-font-mono); font-size: 13px; resize: vertical; }
    .v-field input:focus,
    .v-field select:focus,
    .v-field textarea:focus {
      outline: none;
      border-color: var(--v-accent);
      background: rgba(0,0,0,0.4);
      box-shadow: 0 0 0 3px var(--v-glow);
    }
    .v-form-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding-top: 8px;
      border-top: 1px solid var(--v-line);
    }
    .v-form-fine {
      font-family: var(--v-font-mono);
      font-size: 10px;
      color: var(--v-muted);
      letter-spacing: 0.04em;
      max-width: 32ch;
    }
    .v-form-done {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: flex-start;
      padding: 32px 0;
    }
    .v-form-done-h {
      font-size: 36px;
      font-weight: 400;
      letter-spacing: -0.025em;
      margin: 0;
    }
    .v-form-done-h em {
      font-family: var(--v-font-serif);
      font-style: italic;
      color: var(--v-accent);
    }
    .v-form-done p {
      color: var(--v-text-2);
      margin: 0;
      font-size: 16px;
      font-weight: 300;
    }

    /* ──────────────────────────────────────────────────────────
       Contact
       ────────────────────────────────────────────────────────── */
    .v-contact {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    @media (max-width: 800px) { .v-contact { grid-template-columns: 1fr; gap: 40px; } }
    .v-contact-card {
      padding: 40px;
      border: 1px solid var(--v-line-2);
      border-radius: var(--v-rad-xl);
      background: var(--v-card);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .v-contact-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--v-accent), var(--v-accent-deep));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--v-font-serif);
      font-style: italic;
      font-size: 32px;
      color: #0a0f0a;
      font-weight: 400;
    }
    .v-contact-name {
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.025em;
    }
    .v-contact-role {
      font-family: var(--v-font-mono);
      font-size: 11px;
      color: var(--v-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 6px;
    }
    .v-contact-rows {
      display: flex;
      flex-direction: column;
    }

    /* ──────────────────────────────────────────────────────────
       Big CTA / Footer
       ────────────────────────────────────────────────────────── */
    .v-bigcta {
      padding: 120px 0 80px;
      text-align: center;
    }
    .v-bigcta-h {
      font-family: var(--v-font-display);
      font-size: clamp(56px, 9vw, 160px);
      font-weight: 400;
      line-height: 0.9;
      letter-spacing: -0.045em;
      margin: 0;
    }
    .v-bigcta-h em {
      font-family: var(--v-font-serif);
      font-style: italic;
      color: var(--v-accent);
      font-weight: 400;
    }
    .v-bigcta-sub {
      font-size: 20px;
      color: var(--v-text-2);
      margin: 32px auto 0;
      max-width: 50ch;
      font-weight: 300;
    }
    .v-bigcta-cta {
      margin-top: 40px;
      display: inline-flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .v-footer {
      border-top: 1px solid var(--v-line);
      padding: 60px 0 40px;
    }
    .v-footer-inner {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 60px;
      padding-bottom: 60px;
    }
    @media (max-width: 700px) { .v-footer-inner { grid-template-columns: 1fr; } }
    .v-footer-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 18px;
    }
    .v-footer-tag {
      color: var(--v-muted);
      font-weight: 300;
      font-size: 13px;
      margin-left: 8px;
      max-width: 30ch;
      line-height: 1.4;
    }
    .v-footer-cols {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
    }
    @media (max-width: 500px) { .v-footer-cols { grid-template-columns: 1fr 1fr; } }
    .v-footer-cols > div { display: flex; flex-direction: column; gap: 12px; }
    .v-footer-h {
      font-family: var(--v-font-mono);
      font-size: 10px;
      color: var(--v-muted);
      letter-spacing: 0.10em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .v-footer-cols a, .v-footer-static {
      font-size: 14px;
      color: var(--v-text);
      font-weight: 400;
    }
    .v-footer-static { color: var(--v-text-2); font-weight: 300; }
    .v-footer-cols a:hover { color: var(--v-accent); }
    .v-footer-base {
      border-top: 1px solid var(--v-line);
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      font-family: var(--v-font-mono);
      font-size: 10px;
      color: var(--v-muted);
      letter-spacing: 0.04em;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* Giant wordmark in footer */
    .v-wordmark {
      font-family: var(--v-font-display);
      font-size: clamp(80px, 18vw, 280px);
      font-weight: 400;
      line-height: 0.85;
      letter-spacing: -0.05em;
      color: var(--v-accent);
      opacity: 0.95;
      text-align: center;
      margin: 60px 0 40px;
      user-select: none;
      background: linear-gradient(180deg, var(--v-accent) 0%, transparent 110%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .v-wordmark em {
      font-family: var(--v-font-serif);
      font-style: italic;
    }

    /* ──────────────────────────────────────────────────────────
       Scroll-reveal motion
       ────────────────────────────────────────────────────────── */
    .v-reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .v-reveal.v-in {
      opacity: 1;
      transform: translateY(0);
    }

    /* ──────────────────────────────────────────────────────────
       Mock illustrations (feature rows)
       ────────────────────────────────────────────────────────── */
    .v-mock {
      width: 100%;
      border-radius: var(--v-rad-lg);
      border: 1px solid var(--v-line-2);
      background: var(--v-bg-deep);
      overflow: hidden;
      box-shadow:
        0 30px 60px -20px rgba(0,0,0,.5),
        0 0 0 1px rgba(255,255,255,0.02) inset;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    /* Browser chrome (shared) */
    .v-mock-chrome {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--v-line);
      background: rgba(0,0,0,0.25);
    }
    .v-mock-dots {
      display: inline-flex;
      gap: 5px;
    }
    .v-mock-dots span {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
    }
    .v-mock-dots span:nth-child(1) { background: #f87171; }
    .v-mock-dots span:nth-child(2) { background: #fbbf24; }
    .v-mock-dots span:nth-child(3) { background: #4ade80; }
    .v-mock-url {
      flex: 1;
      text-align: center;
      font-size: 10.5px;
      color: #94a3b8;
      padding: 4px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 999px;
      max-width: 320px;
      margin: 0 auto;
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    .v-mock-live {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 9.5px;
      color: #34d399;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .v-mock-live-d {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 6px #34d399;
      animation: vblink 1.4s ease-in-out infinite;
    }

    .v-mock-body {
      background:
        radial-gradient(800px 400px at 15% 0%, rgba(16,185,129,0.08), transparent 55%),
        linear-gradient(180deg, #0b1220 0%, #0b1220 100%);
      padding: 14px;
      min-height: 320px;
    }

    /* ── MiniRoomsMock ── */
    .v-mock--rooms .v-mock-body { padding: 12px; }
    .v-mock-hero-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(6,78,59,0.98), rgba(6,95,70,0.92), rgba(4,120,87,0.7));
      color: #fff;
      margin-bottom: 8px;
    }
    .v-mock-hero-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .v-mock-hero-meta {
      font-size: 9px;
      color: rgba(255,255,255,0.7);
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    .v-mock-tabs {
      display: flex;
      gap: 3px;
      padding: 4px;
      background: rgba(15,23,42,0.55);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow-x: auto;
    }
    .v-mock-tab {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 10px;
      color: #94a3b8;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .v-mock-tab--active {
      background: linear-gradient(135deg, rgba(16,185,129,0.95), rgba(14,165,233,0.75));
      color: #fff;
      font-weight: 700;
    }
    .v-mock-tab-b {
      background: #e11d48;
      color: #fff;
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 999px;
      font-weight: 700;
      line-height: 1.4;
    }

    .v-mock-map {
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,0.18);
      background: rgba(15,23,42,0.4);
      padding: 10px;
    }
    .v-mock-map-h {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .v-mock-map-t {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #f1f5f9;
    }
    .v-mock-map-bar {
      width: 3px; height: 11px;
      background: #14b8a6;
      border-radius: 2px;
    }
    .v-mock-map-hint {
      font-size: 9px;
      color: #64748b;
    }
    .v-mock-halls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .v-mock-hall { display: flex; flex-direction: column; gap: 4px; }
    .v-mock-hall-h {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 10px;
      border-radius: 8px;
      color: #fff;
      font-size: 10px;
      font-weight: 600;
    }
    .v-mock-hall-c { font-size: 8.5px; opacity: 0.85; font-weight: 400; }
    .v-mock-hall-rooms {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 3px;
    }
    .v-mock-room {
      border-radius: 4px;
      padding: 5px 2px;
      text-align: center;
      font-size: 8px;
      font-weight: 500;
      border: 1px solid rgba(148,163,184,0.18);
      line-height: 1.1;
    }
    .v-mock-room--assigned {
      background: rgba(16,185,129,0.18);
      color: #d1fae5;
      border-color: rgba(16,185,129,0.35);
    }
    .v-mock-room--empty {
      background: rgba(148,163,184,0.10);
      color: #94a3b8;
    }
    .v-mock-room--task {
      background: rgba(245,158,11,0.20);
      color: #fde68a;
      border-color: rgba(245,158,11,0.40);
    }
    .v-mock-room--alert {
      background: rgba(239,68,68,0.20);
      color: #fecaca;
      border-color: rgba(239,68,68,0.45);
    }

    /* ── MiniRequestsAnim ── */
    .v-mock--requests .v-mock-body { padding: 16px; min-height: 380px; }
    .v-mock-req-cols {
      display: grid;
      grid-template-columns: 1fr 60px 1fr;
      gap: 12px;
      align-items: start;
    }
    @media (max-width: 600px) {
      .v-mock-req-cols { grid-template-columns: 1fr; }
      .v-mock-req-arrow { display: none !important; }
    }
    .v-mock-req-col {
      background: rgba(15,23,42,0.5);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .v-mock-req-col-h {
      font-size: 9px;
      color: #94a3b8;
      letter-spacing: 0.08em;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-weight: 600;
      padding-bottom: 6px;
      border-bottom: 1px dashed rgba(148,163,184,0.18);
    }
    .v-mock-qa-stack {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .v-mock-qa-btn {
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 10px;
      color: #fff;
      font-weight: 500;
      text-align: center;
      line-height: 1.3;
    }
    .v-mock-qa-btn--amber   { background: #d97706; }
    .v-mock-qa-btn--emerald { background: #059669; }
    .v-mock-qa-btn--sky     { background: #0369a1; }
    .v-mock-qa-btn--teal    { background: #047857; }

    .v-anim-press {
      animation: vpress 6s ease-in-out infinite;
    }
    @keyframes vpress {
      0%, 8%, 100% { transform: translateY(0); box-shadow: 0 0 0 0 rgba(217,119,6,0); }
      10%, 14% { transform: translateY(1px); box-shadow: 0 0 0 4px rgba(217,119,6,0.3); }
      18% { transform: translateY(0); box-shadow: 0 0 0 0 rgba(217,119,6,0); }
    }

    .v-mock-req-form {
      margin-top: 6px;
      padding: 10px;
      background: rgba(217,119,6,0.10);
      border: 1px solid rgba(217,119,6,0.35);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      transform: translateY(8px);
      animation: vformin 6s ease-in-out infinite;
    }
    @keyframes vformin {
      0%, 15% { opacity: 0; transform: translateY(8px); }
      20%, 60% { opacity: 1; transform: translateY(0); }
      65%, 100% { opacity: 0; transform: translateY(-8px); }
    }
    .v-mock-req-form-h {
      font-size: 10px;
      font-weight: 600;
      color: #fbbf24;
      margin-bottom: 2px;
    }
    .v-mock-req-form-row {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: #cbd5e1;
    }
    .v-mock-req-form-row > span:first-child {
      color: #64748b;
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    .v-mock-req-form-submit {
      margin-top: 4px;
      padding: 5px 8px;
      background: #d97706;
      color: #fff;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 600;
      text-align: center;
    }

    .v-mock-req-arrow {
      position: relative;
      align-self: center;
      padding-top: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .v-mock-req-arrow-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, rgba(148,163,184,0.2), rgba(52,211,153,0.6), rgba(148,163,184,0.2));
      position: relative;
      overflow: hidden;
    }
    .v-mock-req-pulse {
      position: absolute;
      top: -3px;
      left: -10px;
      width: 10px;
      height: 7px;
      background: #34d399;
      border-radius: 3px;
      box-shadow: 0 0 12px #34d399;
      animation: vpulseh 3s linear infinite;
    }
    @keyframes vpulseh {
      from { left: -20px; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      to { left: 100%; opacity: 0; }
    }
    .v-mock-req-arrow-l {
      font-size: 8.5px;
      color: #64748b;
      text-align: center;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      letter-spacing: 0.04em;
    }

    /* Manager toast */
    .v-mock-toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #1f2937;
      border: 1px solid rgba(239,68,68,0.4);
      border-left: 3px solid #ef4444;
      border-radius: 8px;
      box-shadow: 0 8px 20px -4px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateX(20px);
      animation: vtoast 6s ease-in-out infinite;
    }
    @keyframes vtoast {
      0%, 25% { opacity: 0; transform: translateX(20px); }
      30%, 70% { opacity: 1; transform: translateX(0); }
      75%, 100% { opacity: 0; transform: translateX(-20px); }
    }
    .v-mock-toast-icon {
      width: 22px; height: 22px;
      background: #ef4444;
      color: #fff;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .v-mock-toast-title {
      font-size: 10.5px;
      color: #f1f5f9;
      font-weight: 600;
    }
    .v-mock-toast-sub {
      font-size: 9px;
      color: #94a3b8;
      margin-top: 1px;
    }

    .v-mock-req-queue {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .v-mock-req-queue-h {
      font-size: 10px;
      color: #cbd5e1;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .v-mock-req-queue-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 7px 8px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(148,163,184,0.15);
      border-radius: 7px;
    }
    .v-mock-req-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .v-mock-req-dot--ok    { background: #34d399; }
    .v-mock-req-dot--warn  { background: #fbbf24; }
    .v-mock-req-dot--alert { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    .v-mock-req-item-t {
      font-size: 10px;
      color: #f1f5f9;
      font-weight: 500;
    }
    .v-mock-req-item-s {
      font-size: 9px;
      color: #64748b;
    }
    .v-mock-req-approve {
      background: #059669;
      color: #fff;
      border: none;
      padding: 4px 9px;
      border-radius: 5px;
      font-size: 9px;
      font-weight: 600;
      cursor: default;
    }
    .v-anim-new {
      animation: vqueuein 6s ease-in-out infinite;
    }
    @keyframes vqueuein {
      0%, 35% { background: rgba(255,255,255,0.02); border-color: rgba(148,163,184,0.15); }
      40%, 75% { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.4); }
      80%, 100% { background: rgba(255,255,255,0.02); border-color: rgba(148,163,184,0.15); }
    }

    /* ── DeviceShowcase ── */
    .v-mock--devices {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .v-devices {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 16px;
      min-height: 280px;
      padding: 16px 0;
    }
    @media (max-width: 700px) {
      .v-devices { flex-wrap: wrap; gap: 8px; }
    }

    /* Phone */
    .v-device--phone {
      width: 110px;
      height: 220px;
      background: #0a0a0a;
      border-radius: 18px;
      padding: 5px;
      border: 1.5px solid #1f2937;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
      position: relative;
      z-index: 3;
    }
    .v-device-phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      background: #0b1220;
      padding: 8px 6px 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow: hidden;
    }
    .v-device-phone-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 8px;
      color: #cbd5e1;
      padding: 0 4px;
    }
    .v-device-phone-icons {
      display: inline-flex;
      gap: 3px;
    }
    .v-icon-signal, .v-icon-wifi, .v-icon-batt {
      width: 8px; height: 6px;
      background: currentColor;
      border-radius: 1px;
      opacity: 0.8;
    }
    .v-icon-batt { width: 12px; height: 6px; border-radius: 1px; border: 1px solid currentColor; background: linear-gradient(to right, currentColor 70%, transparent 70%); }
    .v-device-app-hero {
      background: linear-gradient(135deg, #065f46, #047857);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 5px 8px;
      border-radius: 6px;
      text-align: center;
    }
    .v-device-app-tabs {
      display: flex;
      gap: 3px;
      background: rgba(15,23,42,0.5);
      padding: 3px;
      border-radius: 6px;
    }
    .v-device-app-tab {
      flex: 1;
      text-align: center;
      padding: 3px 4px;
      border-radius: 999px;
      font-size: 8px;
      color: #94a3b8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .v-device-app-tab--active {
      background: linear-gradient(135deg, #10b981, #0ea5e9);
      color: #fff;
      font-weight: 600;
    }
    .v-device-tab-b {
      background: #e11d48;
      color: #fff;
      font-size: 6.5px;
      padding: 0 3px;
      border-radius: 999px;
      font-weight: 700;
    }
    .v-device-app-rooms {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      flex: 1;
    }
    .v-device-room {
      border-radius: 3px;
      border: 1px solid rgba(148,163,184,0.18);
    }
    .v-device-room--assigned { background: rgba(16,185,129,0.35); border-color: rgba(16,185,129,0.5); }
    .v-device-room--empty    { background: rgba(148,163,184,0.15); }
    .v-device-room--task     { background: rgba(245,158,11,0.35); border-color: rgba(245,158,11,0.5); }
    .v-device-room--alert    { background: rgba(239,68,68,0.35); border-color: rgba(239,68,68,0.5); }
    .v-device-app-cta {
      background: #047857;
      color: #fff;
      text-align: center;
      padding: 5px;
      border-radius: 4px;
      font-size: 8px;
      font-weight: 600;
    }
    .v-device-home {
      width: 38px; height: 3px;
      background: #fff;
      border-radius: 2px;
      margin: 4px auto 0;
      opacity: 0.6;
      position: absolute;
      left: 50%;
      bottom: 4px;
      transform: translateX(-50%);
    }

    /* Tablet */
    .v-device--tablet {
      width: 200px;
      height: 150px;
      background: #0a0a0a;
      border-radius: 12px;
      padding: 5px;
      border: 1.5px solid #1f2937;
      box-shadow: 0 18px 36px -10px rgba(0,0,0,0.6);
      z-index: 2;
    }
    .v-device-tablet-screen {
      width: 100%; height: 100%;
      border-radius: 8px;
      background: #0b1220;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .v-device-tablet-bar {
      background: linear-gradient(135deg, #065f46, #047857);
      color: #fff;
      font-size: 8px;
      font-weight: 700;
      padding: 3px 6px;
      border-radius: 4px;
    }
    .v-device-tablet-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 2px;
      flex: 1;
    }

    /* Laptop */
    .v-device--laptop {
      width: 320px;
      position: relative;
      z-index: 1;
    }
    .v-device-laptop-screen {
      width: 100%;
      height: 200px;
      background: #0a0a0a;
      border-radius: 8px 8px 2px 2px;
      padding: 5px;
      border: 1.5px solid #1f2937;
      border-bottom: none;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .v-device-laptop-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      background: rgba(15,23,42,0.8);
      border-radius: 4px 4px 0 0;
    }
    .v-device-laptop-dots { display: inline-flex; gap: 3px; }
    .v-device-laptop-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
    }
    .v-device-laptop-dots span:nth-child(1) { background: #f87171; }
    .v-device-laptop-dots span:nth-child(2) { background: #fbbf24; }
    .v-device-laptop-dots span:nth-child(3) { background: #4ade80; }
    .v-device-laptop-url {
      flex: 1;
      font-size: 7.5px;
      color: #94a3b8;
      text-align: center;
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }
    .v-device-laptop-content {
      flex: 1;
      background: #0b1220;
      padding: 6px;
      border-radius: 0 0 4px 4px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .v-device-laptop-hero {
      background: linear-gradient(135deg, #065f46, #047857);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 5px;
    }
    .v-device-laptop-grid {
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      gap: 2px;
      flex: 1;
    }
    .v-device-laptop-base {
      width: 360px;
      height: 6px;
      background: linear-gradient(180deg, #1f2937 0%, #0a0a0a 100%);
      border-radius: 0 0 8px 8px;
      margin: 0 auto;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }
    .v-device-mini {
      border-radius: 2px;
    }
    .v-device-mini--assigned { background: rgba(16,185,129,0.4); }
    .v-device-mini--empty    { background: rgba(148,163,184,0.18); }
    .v-device-mini--task     { background: rgba(245,158,11,0.4); }
    .v-device-mini--alert    { background: rgba(239,68,68,0.4); }

    /* Platforms badge row */
    .v-platforms {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    @media (max-width: 600px) {
      .v-platforms { grid-template-columns: repeat(2, 1fr); }
    }
    .v-platform {
      padding: 14px 14px;
      border: 1px solid var(--v-line);
      border-radius: var(--v-rad-md);
      background: var(--v-card);
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-start;
      transition: border-color 0.2s ease;
    }
    .v-platform:hover { border-color: var(--v-line-2); }
    .v-platform-icon {
      width: 24px;
      height: 24px;
      color: var(--v-accent);
    }
    .v-platform-l {
      font-size: 13px;
      font-weight: 500;
      color: var(--v-text);
      letter-spacing: -0.01em;
    }
    .v-platform-s {
      font-size: 11px;
      color: var(--v-muted);
      font-family: var(--v-font-mono);
      letter-spacing: 0.02em;
    }

    /* ── FacilityMock ── */
    .v-mock--facility {
      box-shadow:
        0 20px 40px -16px rgba(0,0,0,.5),
        0 0 0 1px rgba(255,255,255,0.02) inset;
    }
    .v-mock-facility-img {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
    }
    .v-mock-facility-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .v-mock-facility-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .v-mock-facility-overlay {
      position: absolute;
      inset: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 6px;
      background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.5));
    }
    .v-mock-facility-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      border-radius: 999px;
      font-size: 11px;
      color: rgba(255,255,255,0.95);
      align-self: flex-start;
      font-family: var(--v-font-mono);
    }
    .v-mock-facility-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--v-accent);
      box-shadow: 0 0 6px var(--v-accent);
    }
    .v-mock-facility-note {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      font-family: var(--v-font-mono);
      letter-spacing: 0.02em;
    }

    /* Light mode tweaks */
    [data-mode="light"] .v-ambient { opacity: 0.5; }
    [data-mode="light"] .v-btn--primary { color: #f6f5f0; }
    [data-mode="light"] .v-contact-avatar { color: #f6f5f0; }
    [data-mode="light"] .v-preview-side { background: rgba(0,0,0,0.02); }

    /* Top nav stays dark in light mode */
    [data-mode="light"] .v-nav {
      background: rgba(10, 14, 11, 0.78);
      border-color: rgba(202, 215, 200, 0.16);
    }
    [data-mode="light"] .v-nav-brand { color: #ecf0e9; }
    [data-mode="light"] .v-nav-links a { color: #b8c1b6; }
    [data-mode="light"] .v-nav-links a:hover { color: #ecf0e9; }

    /* Management software examples stay dark in light mode —
       override the CSS vars locally so all internals follow */
    [data-mode="light"] .v-preview,
    [data-mode="light"] .v-mock {
      --v-bg: #0a0e0b;
      --v-bg-deep: #060807;
      --v-card: #131814;
      --v-elev: #1a211d;
      --v-line: rgba(202, 215, 200, 0.08);
      --v-line-2: rgba(202, 215, 200, 0.16);
      --v-line-3: rgba(202, 215, 200, 0.30);
      --v-text: #ecf0e9;
      --v-text-2: #b8c1b6;
      --v-muted: #7a847a;
      color: #ecf0e9;
    }
    [data-mode="light"] .v-preview .v-preview-chrome,
    [data-mode="light"] .v-mock .v-mock-chrome {
      background: rgba(255,255,255,0.01);
    }
  </style>
</head>
<body>
  <div class="v-ambient"></div>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="mocks.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
